<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <title>Decode Her Heart - Visual Novel</title>
 <link rel="stylesheet" href="style.css">
 
 <!-- CSS Tambahan untuk Pop-up Maintenance -->
 <style>
 .maintenance-overlay {
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: rgba(0, 0, 0, 0.4); /* Menggelapkan background sedikit agar pop-up fokus */
 backdrop-filter: blur(3px); /* Efek blur estetik pada game di belakangnya */
 z-index: 9999; /* Memastikan berada di paling depan agar tombol game tidak bisa diklik */
 display: flex;
 justify-content: center;
 align-items: center;
 }

 .maintenance-box {
 background: rgba(20, 15, 30, 0.9); /* Warna gelap transparan senada game */
 border: 2px solid #ff4a7d; /* Border pink/neon khas game VN */
 border-radius: 12px;
 padding: 25px 35px;
 text-align: center;
 max-width: 400px;
 width: 85%;
 box-shadow: 0 0 20px rgba(255, 74, 125, 0.4);
 color: #ffffff;
 font-family: sans-serif;
 animation: popIn 0.3s ease-out;
 }

 .maintenance-box h2 {
 margin: 0 0 10px 0;
 color: #ff4a7d;
 font-size: 22px;
 text-transform: uppercase;
 letter-spacing: 1px;
 }

 .maintenance-box p {
 margin: 0;
 font-size: 15px;
 line-height: 1.5;
 color: #e0e0e0;
 }

 .maintenance-icon {
 font-size: 35px;
 margin-bottom: 8px;
 display: inline-block;
 animation: spin 4s linear infinite;
 }

 @keyframes popIn {
 0% { transform: scale(0.9); opacity: 0; }
 100% { transform: scale(1); opacity: 1; }
 }

 @keyframes spin {
 100% { transform: rotate(360deg); }
 }
 </style>
</head>
<body>

 <!-- ========================================================== -->
 <!-- KOTAK POP-UP MAINTENANCE (MENGUNCI GAME DI BELAKANGNYA) -->
 <!-- Ubah style="display: flex;" untuk mengaktifkan maintenance -->
 <!-- Ubah style="display: none;" jika maintenance sudah selesai -->
 <!-- ========================================================== -->
 <div id="maintenanceOverlay" class="maintenance-overlay" style="display: flex;">
 <div class="maintenance-box">
 <div class="maintenance-icon">⚙️</div>
 <h2>Server Maintenance</h2>
 <p>Game sedang dalam pembaruan sistem/update cerita baru. Sementara waktu game tidak dapat dimainkan. Mohon kembali lagi nanti!</p>
 </div>
 </div>
 <!-- ========================================================== -->

 <div class="particle-container" id="particleContainer"></div>

 <div id="mainMenu" class="screen active">
 <div class="menu-overlay"></div>
 <div class="menu-content">
 <h1 class="game-title">Decode<br>Her Heart</h1>
 <p class="game-subtitle">Seberapa jauh kamu bisa membaca hatinya?</p>
 
 <div class="menu-buttons">
 <button class="btn primary-btn" onclick="game.startNewGame()">Mulai Baru</button>
 <button class="btn secondary-btn" id="continueBtn" style="display:none;" onclick="window.location.href='episode.html'">Lanjutkan</button>
 <button class="btn secondary-btn" onclick="ui.toggleModal('settingsModal')">Pengaturan</button>
 </div>
 </div>
 </div>

 <div id="gameContainer" class="screen">
 <div id="bgLayer" class="bg-layer"></div>
 <div class="cinematic-fade" id="fadeLayer"></div>

 <div class="top-bar glass">
 <div class="stats-display">
 <span class="stat-label">❤</span>
 <div class="bar-container">
 <div id="affectionBar" class="bar-fill" style="width: 0%;"></div>
 </div>
 <span id="affectionValue" class="stat-value">0%</span>
 </div>
 
 <div class="quick-menu">
 <button class="icon-btn" onclick="game.toggleAuto()" id="autoBtn">AUTO</button>
 <button class="icon-btn" onclick="game.toggleSkip()" id="skipBtn">SKIP</button>
 <button class="icon-btn" onclick="ui.toggleHistory()">LOG</button>
 <button class="icon-btn" onclick="game.manualSave()">SAVE</button>
 <button class="icon-btn" onclick="ui.toggleModal('settingsModal')">⚙</button>
 </div>
 </div>

 <div class="stage">
 <div id="charBoy" class="character sprite-boy"></div>
 <div id="charGirl" class="character sprite-girl"></div>
 </div>

 <div class="dialogue-area">
 <div id="nameBox" class="name-box glass">Pembicara</div>
 <div id="dialogueBox" class="dialogue-box glass" onclick="game.nextStep()">
 <p id="dialogueText">Menghubungkan baris cerita...</p>
 <div class="click-indicator">▼</div>
 </div>
 </div>

 <div id="choiceContainer" class="choice-container hidden"></div>
 </div>

 <div id="settingsModal" class="modal hidden glass">
 <div class="modal-content">
 <h2>Pengaturan</h2>
 <hr>
 <div class="setting-item">
 <label>Volume Musik</label>
 <input type="range" id="bgmVolume" min="0" max="1" step="0.1" value="0.5" onchange="window.audioSystem.setBgmVolume(this.value)">
 </div>
 <div class="setting-item">
 <label>Volume SFX</label>
 <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7" onchange="window.audioSystem.setSfxVolume(this.value)">
 </div>
 <div class="setting-item">
 <label>Kecepatan Teks</label>
 <input type="range" id="textSpeed" min="20" max="120" step="10" value="65">
 </div>
 <div class="setting-item">
 <label>Kecepatan Auto Mode</label>
 <input type="range" id="autoSpeed" min="1000" max="4000" step="500" value="2000">
 </div>
 <div class="setting-item" style="flex-direction: row; justify-content: space-between; align-items: center;">
 <label>Fullscreen Mode</label>
 <input type="checkbox" id="fullscreenToggle" onchange="ui.toggleFullscreen()">
 </div>
 <button class="btn primary-btn close-btn" onclick="ui.toggleModal('settingsModal')">Kembali</button>
 </div>
 </div>

 <div id="historyModal" class="modal hidden glass">
 <div class="modal-content history-content">
 <h2>Log Cerita</h2>
 <hr>
 <div id="historyLog" class="history-log"></div>
 <button class="btn primary-btn close-btn" onclick="ui.toggleHistory()">Tutup</button>
 </div>
 </div>

 <script src="story/character.js"></script>
 <script src="story/ending.js"></script>
 <script src="story/episode1.js"></script>
 <script src="story/episode2.js"></script>
 <script src="js/save.js"></script>
 <script src="scrit.js"></script>

 <script>
 window.addEventListener("DOMContentLoaded", () => {
 const urlParams = new URLSearchParams(window.location.search);
 const targetEp = urlParams.get('ep');
 
 // Pengaman tambahan agar cerita otomatis tidak ter-trigger saat maintenance aktif
 const isMaintenance = document.getElementById('maintenanceOverlay').style.display === 'flex';
 if (isMaintenance) return;

 if (targetEp && typeof game !== 'undefined') {
 if (targetEp === "episode1") {
 game.startNewGame();
 } else if (targetEp === "episode2") {
 game.currentEpisodeId = "episode2";
 game.currentPointer = 0;
 ui.switchScreen("gameContainer");
 game.renderFrame();
 }
 }
 });
 </script>
</body>
</html>
